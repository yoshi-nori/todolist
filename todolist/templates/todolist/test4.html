{% load static %}
<!doctype html>
<html lang="ja">
    <head>
        <meta charset="utf-8">
        <title>Cafe - CONTACT</title>
        <meta name="discription" content="メニュー">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" type="image/png" href="{% static 'todolist/img/icon.png' %}">
        <meta property="og:url" content="{% url 'todolist:test' %}">
        <meta property="og:type" content="website">
        <meta property="og:title" content="Cafe - Home">
        <meta property="og:description" content="ヤッホー">
        <meta property="og:image" content="{% static 'todolist/img/background2.png' %}">

        <!-- CSS -->
        <link rel="stylesheet" type="text/css" href="https://unpkg.com/ress/dist/ress.min.css"/>
        <link rel="stylesheet" type="text/css" href="{% static 'todolist/css/test.css' %}"/>
    </head>
    <body>
        <div id="fb-root"></div>
        <script async defer crossorigin="anonymous" src="https://connect.facebook.net/ja_JP/sdk.js#xfbml=1&version=v14.0" nonce="wnhX6wxz"></script>
        <div id="contact" class="big-bg">
            <header class="page-header wrapper">
                <h1><a href="{% url 'todolist:workdatemodel_list' %}"><img class="logo" src="{% static 'todolist/img/icon.png' %}" alt="アイコン"></a></h1>
                <nav>
                    <ul class="main-nav">
                        <li><a href="{% url 'todolist:test' %}">テスト1</a></li>
                        <li><a href="{% url 'todolist:test2' %}">テスト2</a></li>
                        <li><a href="{% url 'todolist:test3' %}">テスト3</a></li>
                        <li><a href="{% url 'todolist:test4' %}">テスト4</a></li>
                    </ul>
                </nav>
            </header>
            <div class="contact-content wrapper">
                <h2 class="page-title">Contact</h2>
                <form action="{% url 'todolist:test' %}" metod="get">
                    <div>
                        <label for="name">お名前</label>
                        <input type="text" id="name" name="your-name">
                    </div>
                    <div>
                        <label for="email">メールアドレス</label>
                        <input type="email" id="email" name="your-email">
                    </div>
                    <div>
                        <label for="message">メッセージ</label>
                        <textarea id="message" name="your-message"></textarea>
                    </div>
                    <button class="button" type="submit">送信</button>
                </form>
            </div><!-- /.contact-content -->
        </div>
        <section id="location">
            <div class="wrapper">
                <div class="location-info">
                    <h3 class="sub-title">カフェ 東駅前店</h3>
                    <p>
                        住所：ああ<br>
                        〇〇<br>
                        〇〇<br>
                        電話：0120-<br>
                        営業時間：10:00 ~ 23:00<br>
                        休日：水曜日
                    </p>
                </div><!-- /.location-info -->
                <div class="location-map">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d20281.271876530656!2d141.01058298780296!3d37.453467886957064!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6020e82c61b2a6d5%3A0x7b458427ea7be3a8!2z5Y-M6JGJ6aeF!5e0!3m2!1sja!2sjp!4v1655487340413!5m2!1sja!2sjp" width="800" height="400" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div><!-- /.location-map -->
            </div>
        </section><!-- /#location -->
        <section id="sns">
            <div class="wrapper">
                <div class="sns-box">
                    <h3 class="sub-title">Facebook</h3>
                    <div class="fb-page" data-href="https://www.facebook.com/utayui.acappella/" data-tabs="timeline" data-width="" data-height="" data-small-header="false" data-adapt-container-width="true" data-hide-cover="false" data-show-facepile="true"><blockquote cite="https://www.facebook.com/utayui.acappella/" class="fb-xfbml-parse-ignore"><a href="https://www.facebook.com/utayui.acappella/">うたゆい</a></blockquote></div>
                </div>
                <div class="sns-box">
                    <h3 class="sub-title">Twitter</h3>
                    <a class="twitter-timeline" data-height="500" href="https://twitter.com/hanareOffcial?ref_src=twsrc%5Etfw">Tweets by hanareOffcial</a> <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
                </div>
                <div class="sns-box">
                    <h3 class="sub-title">Youtube</h3>
                    <iframe width="560" height="315" src="https://www.youtube.com/embed/ddaGdiCUpdI" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div><!-- /.wrapper -->
        </section><!-- #sns -->
        <footer>
            <div class="wrapper">
                <p><small>Copyrights &copy; 2022 Test</small></p>
            </div>
        </footer>
    </body>
</html>
